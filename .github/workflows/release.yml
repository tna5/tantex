name: Release Builds

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tantex
            asset_name: tantex-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tantex.exe
            asset_name: tantex-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tantex
            asset_name: tantex-macos-x86_64

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: tantex
            asset_name: tantex-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build dashboard
        run: |
          cd dashboard
          bun install
          bun run generate

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Copy artifact (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        shell: cmd

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
